<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chuyên Đề 50 Câu Trắc Nghiệm Tổng Hợp - Ms Lê Hằng English</title>
    <!-- Nhúng Google Fonts phong cách ứng dụng học tập thông minh -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Quicksand:wght@500;700;900&display=swap" rel="stylesheet">
    
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        :root {
            --primary-gradient: linear-gradient(135deg, #74B9FF, #A8E6CF, #FFD3B6, #FFAAA5, #D4A5A5);
            --correct-color: #00D26A;
            --wrong-color: #FF4757;
            --text-main: #2D3436;
            --card-bg: rgba(255, 255, 255, 0.96);
            --purple-accent: #8854C0;
        }

        body {
            font-family: 'Quicksand', 'Nunito', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            color: var(--text-main);
            background: var(--primary-gradient);
            background-size: 400% 400%;
            animation: loangMauNenChuyenDong 25s ease infinite;
            position: relative;
            overflow-x: hidden;
        }

        @keyframes loangMauNenChuyenDong {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .pattern-overlay-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
            opacity: 0.15;
            mix-blend-mode: overlay;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160' viewBox='0 0 160 160'><g fill='%23FFFFFF'><path d='M20,20 L26,32 L38,34 L29,42 L32,54 L20,47 L8,54 L11,42 L2,34 L14,32 Z'/><circle cx='120' cy='40' r='10'/><path d='M40,110 C40,98 60,92 80,104 C100,92 120,98 120,110 C120,122 40,122 40,110 Z' opacity='0.6'/><path d='M130,120 Q142,102 154,120 T166,120' stroke='%23FFFFFF' stroke-width='3' fill='none'/></g></svg>");
            animation: movingBackgroundPattern 40s linear infinite;
        }

        @keyframes movingBackgroundPattern {
            from { background-position: 0 0; }
            to { background-position: 320px 640px; }
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 2;
        }

        header {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 8px 24px;
            border-radius: 14px;
            box-shadow: 0 4px 0 rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
            border: 2px solid var(--purple-accent);
            display: inline-block;
            left: 50%;
            transform: translateX(-50%);
            position: relative;
        }

        header h1 {
            font-size: 1rem;
            color: var(--purple-accent);
            margin: 0;
            font-weight: 900;
        }

        .important-notice-box {
            background: #FFF9E6;
            border: 4px dashed #FDCB6E;
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 25px;
            box-shadow: 0 8px 0 rgba(253, 203, 110, 0.2);
            text-align: center;
        }

        .notice-title {
            font-size: 1.15rem;
            font-weight: 900;
            color: #D35400;
            margin-bottom: 6px;
            display: block;
        }

        .notice-content {
            font-size: 1rem;
            line-height: 1.5;
            color: #2D3436;
            font-weight: 700;
        }

        .quiz-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 22px;
            box-shadow: 0 10px 0 rgba(0, 0, 0, 0.05);
            border: 3px solid #FFF;
            position: relative;
        }

        .question-header {
            display: flex;
            align-items: flex-start;
            margin-bottom: 14px;
        }

        .question-number {
            background: var(--purple-accent);
            color: #FFF;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            margin-right: 12px;
            font-size: 0.95rem;
            box-shadow: 0 4px 0 #6c3da3;
            flex-shrink: 0;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: 700;
            line-height: 1.6;
            color: var(--text-main);
            margin-top: 2px;
        }

        .choices-grid {
            display: flex;
            flex-direction: column;
            margin-top: 15px;
        }

        .choice-btn {
            display: flex;
            align-items: center;
            width: 100%;
            background: #FFF;
            border: 3px solid #E2E8F0;
            border-radius: 18px;
            padding: 12px 18px;
            margin-bottom: 10px;
            font-size: 1rem;
            font-weight: 700;
            text-align: left;
            cursor: pointer;
            font-family: inherit;
            color: var(--text-main);
            box-shadow: 0 6px 0 #E2E8F0;
            transition: all 0.1s ease;
        }

        .choice-btn:hover:not(:disabled) {
            transform: scale(1.01) translateY(-2px);
            border-color: #B2BEC3;
            box-shadow: 0 8px 0 #B2BEC3;
        }

        .choice-btn:active:not(:disabled) {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #B2BEC3;
        }

        .choice-prefix {
            background: #F1F5F9;
            border-radius: 10px;
            width: 28px;
            height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            margin-right: 12px;
            color: #64748B;
            flex-shrink: 0;
        }

        .choice-btn.correct-state {
            background-color: #E6FBF1 !important;
            border-color: var(--correct-color) !important;
            box-shadow: 0 6px 0 #00A955 !important;
            color: #006633 !important;
        }

        .choice-btn.correct-state .choice-prefix {
            background-color: var(--correct-color) !important;
            color: white !important;
        }

        .choice-btn.wrong-state {
            background-color: #FFEBEB !important;
            border-color: var(--wrong-color) !important;
            box-shadow: 0 6px 0 #D63031 !important;
            color: #99222A !important;
        }

        .choice-btn.wrong-state .choice-prefix {
            background-color: var(--wrong-color) !important;
            color: white !important;
        }

        .shake-animation {
            animation: shakeEffect 0.4s ease-in-out;
        }

        @keyframes shakeEffect {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }

        .explanation-box {
            margin-top: 18px;
            background: #F8F9FA;
            border-radius: 18px;
            padding: 18px;
            border-left: 6px solid var(--purple-accent);
            display: none;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.04);
        }

        .explanation-title {
            font-weight: 900;
            color: var(--purple-accent);
            font-size: 1.05rem;
            margin-bottom: 10px;
        }

        .explanation-step {
            margin-bottom: 10px;
            font-size: 0.95rem;
            line-height: 1.5;
            color: #4A5568;
        }

        .step-heading {
            font-weight: 900;
            color: #2D3748;
            margin-bottom: 2px;
        }

        .footer-action-wrapper {
            text-align: center;
            margin: 40px 0;
        }

        .submit-exam-btn {
            background: #00D26A;
            color: white;
            border: none;
            border-radius: 25px;
            padding: 16px 60px;
            font-size: 1.3rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 8px 0 #00A955, 0 12px 25px rgba(0,0,0,0.12);
            font-family: inherit;
            transition: all 0.15s;
        }

        .submit-exam-btn:hover {
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 11px 0 #00A955, 0 15px 30px rgba(0,0,0,0.18);
        }

        .submit-exam-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #00A955;
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: all 0.25s ease;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-body-card {
            background: white;
            border-radius: 28px;
            max-width: 500px;
            width: 90%;
            padding: 30px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border: 4px solid var(--purple-accent);
            transform: scale(0.8);
            transition: all 0.25s ease;
        }

        .modal-overlay.active .modal-body-card {
            transform: scale(1);
        }

        .modal-header-title {
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--purple-accent);
            margin-bottom: 10px;
        }

        .modal-score-badge {
            font-size: 3.5rem;
            font-weight: 900;
            color: #00D26A;
            margin: 15px 0;
        }

        .modal-comment-text {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #2D3436;
            font-weight: 700;
            margin-bottom: 25px;
        }

        .modal-reload-btn {
            background: var(--purple-accent);
            color: white;
            border: none;
            border-radius: 18px;
            padding: 12px 40px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 5px 0 #6c3da3;
        }

        #canvas-confetti-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 999;
        }
    </style>
</head>
<body>

    <div class="pattern-overlay-layer"></div>
    <canvas id="canvas-confetti-layer"></canvas>

    <div class="container">
        <header>
            <h1>Giáo viên tạo: Ms Lê Hằng English</h1>
        </header>

        <div class="important-notice-box">
            <span class="notice-title">⚠️ LỜI NHẮC QUAN TRỌNG CỦA CÔ LÊ HẰNG ⚠️</span>
            <span class="notice-content">
                Hệ thống câu hỏi đã được sửa lỗi hiển thị và cập nhật đầy đủ 50 câu trắc nghiệm tổng hợp.<br>
                Hãy rèn luyện tư duy loại trừ và phân tích thật kỹ để đạt kết quả cao nhất nhé!
            </span>
        </div>

        <div id="quiz-dynamic-render-target"></div>

        <div class="footer-action-wrapper">
            <button class="submit-exam-btn" onclick="processExamGrading()">🎉 NỘP BÀI KIỂM TRA 🎉</button>
        </div>
    </div>

    <div class="modal-overlay" id="result-summary-popup">
        <div class="modal-body-card">
            <div class="modal-header-title">🏆 KẾT QUẢ ĐẠT ĐƯỢC 🏆</div>
            <div class="modal-score-badge" id="score-counter-slot">0/0</div>
            <div class="modal-comment-text" id="teacher-feedback-slot">Lời khuyên...</div>
            <button class="modal-reload-btn" onclick="resetAndRestartQuiz()">THỬ SỨC LẠI</button>
        </div>
    </div>

    <script>
        const questionsDatabase = [
            {
                id: 1, text: "In recent years, more and more people ______ for things with credit cards.",
                choices: [{text:"pay",key:"A"}, {text:"paid",key:"B"}, {text:"are paying",key:"C"}, {text:"have been paying",key:"D"}], correct: "D",
                exp: ["Trong những năm gần đây, ngày càng có nhiều người thanh toán mọi thứ bằng thẻ tín dụng.", "Trạng từ 'In recent years' báo hiệu một xu hướng bắt đầu từ quá khứ kéo dài đến nay.", "Định hình xu hướng phát triển kéo dài liên tục đến hiện tại bằng thì Hiện tại hoàn thành tiếp diễn.", "Các thì quá khứ đơn hoặc hiện tại đơn không lột tả được xu hướng tiếp diễn này."]
            },
            {
                id: 2, text: "What people ______ Benetton stores is that the quality is always high.",
                choices: [{text:"like",key:"A"}, {text:"like very much",key:"B"}, {text:"like about",key:"C"}, {text:"like a lot",key:"D"}], correct: "C",
                exp: ["Điều mà mọi người thích ở các cửa hàng Benetton là chất lượng luôn luôn cao.", "Cấu trúc thành ngữ chỉ điểm yêu thích đặc trưng: 'like something about somewhere/something'.", "Giới từ 'about' giúp liên kết đặc điểm cụ thể mà người mua yêu thích ở cửa hàng.", "Các lựa chọn khác thiếu giới từ để kết nối với cụm danh từ phía sau."]
            },
            {
                id: 3, text: "Paolo would like to ______ by the time he is 40.",
                choices: [{text:"travel",key:"A"}, {text:"be traveling",key:"B"}, {text:"be going to travel",key:"C"}, {text:"have traveled",key:"D"}], correct: "D",
                exp: ["Paolo muốn mình đã hoàn thành việc đi du lịch khắp nơi trước khi bước sang tuổi 40.", "Cấu trúc 'by the time + Hiện tại đơn' trong mệnh đề trạng ngữ chỉ thời gian tương lai yêu cầu mệnh đề chính sử dụng hình thái hoàn thành.", "Dạng nguyên mẫu hoàn thành 'to have + V3/ed' thể hiện một mong muốn hoàn tất trước mốc thời gian đó.", "Các đáp án khác chỉ thể hiện hành động chung chung tại thời điểm nói."]
            },
            {
                id: 4, text: "Poverty is a problem in many cities ______ whole families can only afford to live in one room.",
                choices: [{text:"when",key:"A"}, {text:"where",key:"B"}, {text:"even",key:"C"}, {text:"if",key:"D"}], correct: "B",
                exp: ["Nghèo đói là một vấn đề ở nhiều thành phố, nơi mà cả gia đình chỉ đủ điều kiện sống trong một căn phòng.", "Mệnh đề quan hệ chỉ không gian, nơi chốn bổ nghĩa cho danh từ địa điểm 'cities'.", "Đại từ quan hệ 'where' thay thế hoàn hảo cho trạng từ nơi chốn trong mệnh đề phụ.", "Các liên từ thời gian hoặc điều kiện khác làm sai lệch ngữ pháp câu."]
            },
            {
                id: 5, text: "The world would be a better place if everyone showed ______ cooperation as John.",
                choices: [{text:"as much",key:"A"}, {text:"so much",key:"B"}, {text:"too much",key:"C"}, {text:"much",key:"D"}], correct: "A",
                exp: ["Thế giới này sẽ là một nơi tốt đẹp hơn nếu ai cũng thể hiện sự hợp tác nhiều như John.", "Cấu trúc so sánh bằng với danh từ không đếm được: 'as + much + N + as'.", "Sự xuất hiện của từ 'as' ở cuối câu bắt buộc vế trước phải có trạng từ tương ứng làm cặp bài trùng.", "Các từ chỉ số lượng khác không tạo thành cấu trúc so sánh bằng."]
            },
            {
                id: 6, text: "He turned on the TV, ______ I thought was rather surprising.",
                choices: [{text:"and",key:"A"}, {text:"so",key:"B"}, {text:"that",key:"C"}, {text:"which",key:"D"}], correct: "D",
                exp: ["Anh ta đã bật chiếc tivi lên, điều mà tôi nghĩ rằng khá là đáng kinh ngạc.", "Mệnh đề quan hệ không xác định đứng sau dấu phẩy dùng để thay thế ý nghĩa cho toàn bộ mệnh đề phía trước.", "Đại từ quan hệ 'which' có chức năng thay thế cho cả một sự việc đứng trước nó.", "Từ 'that' tuyệt đối không đứng sau dấu phẩy trong mệnh đề quan hệ."]
            },
            {
                id: 7, text: "My car would not start, ______ Jenny’s started immediately.",
                choices: [{text:"whereas",key:"A"}, {text:"though",key:"B"}, {text:"however",key:"C"}, {text:"nevertheless",key:"D"}], correct: "A",
                exp: ["Xe của tôi không tài nào nổ máy được, trong khi đó xe của Jenny lại khởi động được ngay lập tức.", "Liên từ nối thể hiện sự tương phản đối lập trực tiếp giữa hai vế độc lập của một câu.", "'whereas' mang nghĩa 'trong khi đó' diễn tả hành động trái ngược nhau hoàn hảo.", "Các trạng từ liên kết khác cần có dấu phẩy đi kèm rõ ràng."]
            },
            {
                id: 8, text: "They stayed for hours, which I was very ______ .",
                choices: [{text:"annoyed",key:"A"}, {text:"annoyed about",key:"B"}, {text:"annoying",key:"C"}, {text:"annoying me",key:"D"}], correct: "B",
                exp: ["Họ đã ở lại chơi hàng tiếng đồng hồ, điều mà tôi cảm thấy vô cùng bực mình về nó.", "Tính từ dạng đuôi '-ed' bộc lộ cảm xúc bị động của con người trước một tác nhân sự việc.", "Cấu trúc tính từ đi kèm giới từ quy ước: 'be annoyed about something'.", "Dạng đuôi '-ing' chỉ dùng mô tả tính chất sự vật chứ không chỉ cảm xúc người."]
            },
            {
                id: 9, text: "That was a very strange question ______ .",
                choices: [{text:"you ask",key:"A"}, {text:"you are asking",key:"B"}, {text:"for asking",key:"C"}, {text:"to ask",key:"D"}], correct: "D",
                exp: ["Đó quả là một câu hỏi rất kỳ lạ để mà hỏi đấy.", "Cấu trúc rút gọn bổ nghĩa cho cụm danh từ trừu tượng đứng trước: 'Noun + to-V'.", "Dùng động từ nguyên mẫu có 'to' định hình chức năng mục đích của câu hỏi.", "Các lựa chọn mệnh đề khác sai về phối hợp thì thời gian kể quá khứ."]
            },
            {
                id: 10, text: "______ a movie to be entertaining, it has to have an interesting story.",
                choices: [{text:"So that",key:"A"}, {text:"In order that",key:"B"}, {text:"In order for",key:"C"}, {text:"In order to",key:"D"}], correct: "C",
                exp: ["Để cho một bộ phim có tính giải trí, nó bắt buộc phải có một cốt truyện thú vị.", "Cấu trúc chỉ mục đích có tân ngữ tác động riêng biệt đứng trước động từ.", "Công thức chuẩn mực: 'In order for + Object + to-V'.", "Các liên từ khác như 'So that/In order that' bắt buộc phải đứng trước một mệnh đề đầy đủ chủ vị."]
            },
            {
                id: 11, text: "______ I post that letter for you on my way to the office?",
                choices: [{text:"Do",key:"A"}, {text:"Shall",key:"B"}, {text:"Would",key:"C"}, {text:"Will",key:"D"}], correct: "B",
                exp: ["Tớ gửi bức thư đó giúp cậu trên đường đến văn phòng nhé?", "Cấu trúc câu đưa ra lời đề xuất lịch sự, rủ rê hoặc đề nghị giúp đỡ.", "Mẫu câu quốc dân mang tính nhã nhặn: 'Shall I / Shall we + V-bare...?'.", "Các trợ động từ khác không mang sắc thái đề nghị giúp đỡ tự nhiên này."]
            },
            {
                id: 12, text: "He felt he’d really let his team ______ when he missed the penalty.",
                choices: [{text:"out",key:"A"}, {text:"in",key:"B"}, {text:"down",key:"C"}, {text:"off",key:"D"}], correct: "C",
                exp: ["Anh ấy cảm thấy mình thực sự đã làm cả đội thất vọng khi đá hỏng quả phạt đền.", "Kiến thức về cụm động từ (Phrasal Verb) chỉ tâm trạng hụt hẫng.", "Cụm từ cố định: 'let someone down' mang ý nghĩa là làm ai đó thất vọng bỏ cuộc.", "Các giới từ còn lại tạo thành cụm từ mang ý nghĩa hoàn toàn khác."]
            },
            {
                id: 13, text: "He’ll never pass his driving test ______ he takes some lessons.",
                choices: [{text:"unless",key:"A"}, {text:"if only",key:"B"}, {text:"provided",key:"C"}, {text:"if",key:"D"}], correct: "A",
                exp: ["Anh ta sẽ không bao giờ vượt qua bài kiểm tra lái xe trừ khi anh ta chịu học vài buổi.", "Liên từ điều kiện mang tính loại trừ phủ định.", "'unless' tương đương với cụm 'if... not' (trừ khi).", "Nếu dùng 'if' sẽ tạo thành câu mâu thuẫn logic ý nghĩa thực tế."]
            },
            {

        let trackedStudentAnswers = {};
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playDingSound() {
            try {
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, now);
                osc.frequency.setValueAtTime(659.25, now + 0.08);
                osc.frequency.setValueAtTime(783.99, now + 0.16);
                osc.frequency.setValueAtTime(1046.50, now + 0.24);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.22, now + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 0.5);
            } catch(e) {}
        }

        function playBuzzSound() {
            try {
                const now = audioCtx.currentTime;
                const frequencies = [392.00, 349.23, 261.63];
                frequencies.forEach((freq, idx) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(freq, now + (idx * 0.12));
                    gain.gain.setValueAtTime(0, now + (idx * 0.12));
                    gain.gain.linearRampToValueAtTime(0.18, now + (idx * 0.12) + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + (idx * 0.12) + 0.14);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(now + (idx * 0.12)); osc.stop(now + (idx * 0.12) + 0.14);
                });
            } catch(e) {}
        }

        function runConfettiExplosion() {
            const canvas = document.getElementById('canvas-confetti-layer');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            let particles = [];
            const paletteColors = ['#FFC107', '#FF5722', '#E91E63', '#9C27B0', '#00C9A7', '#00D26A', '#8854C0'];
            for (let i = 0; i < 70; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    radius: Math.random() * 4 + 4,
                    density: Math.random() * canvas.height,
                    color: paletteColors[Math.floor(Math.random() * paletteColors.length)],
                    tilt: Math.random() * 10 - 5,
                    tiltIncremental: Math.random() * 0.05 + 0.02,
                    angle: 0
                });
            }
            function animateConfettiFrame() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let continueAnimation = false;
                particles.forEach((p) => {
                    p.angle += p.tiltIncremental;
                    p.y += (Math.cos(p.density) + 3 + p.radius / 2) / 1.8;
                    p.x += Math.sin(p.angle);
                    if (p.y <= canvas.height) continueAnimation = true;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.fill();
                });
                if (continueAnimation) requestAnimationFrame(animateConfettiFrame);
            }
            animateConfettiFrame();
        }

        function shuffleArrayChoices(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                const temp = array[i];
                array[i] = array[j];
                array[j] = temp;
            }
            return array;
        }

        function buildAndRenderInterface() {
            const quizTarget = document.getElementById('quiz-dynamic-render-target');
            quizTarget.innerHTML = '';

            questionsDatabase.forEach((q, idx) => {
                const cardNode = document.createElement('div');
                cardNode.className = 'quiz-card';
                cardNode.id = `card-wrapper-id-${q.id}`;
                
                let choicesHtmlContent = '';
                q.choices.forEach(choice => {
                    choicesHtmlContent += `
                        <button class="choice-btn" id="btn-choice-item-${q.id}-${choice.key}" onclick="evaluateUserChoice(${q.id}, '${choice.key}', '${q.correct}')">
                            <span class="choice-prefix">${choice.key}</span>
                            <span class="choice-body-text">${choice.text}</span>
                        </button>
                    `;
                });

                cardNode.innerHTML = `
                    <div class="question-header">
                        <div class="question-number">${idx + 1}</div>
                        <div class="question-text">${q.text}</div>
                    </div>
                    <div class="choices-grid" id="choices-grid-box-id-${q.id}">
                        ${choicesHtmlContent}
                    </div>
                    
                    <div class="explanation-box" id="explanation-box-view-id-${q.id}">
                        <div class="explanation-title">💡 GIẢI THÍCH CHI TIẾT TỪ CÔ LÊ HẰNG:</div>
                        <div class="explanation-step">
                            <div class="step-heading">🔹 Bước 1: Ý nghĩa ngữ cảnh câu gốc</div>
                            <div>${q.exp[0]}</div>
                        </div>
                        <div class="explanation-step">
                            <div class="step-heading">🔹 Bước 2: Bản chất bẫy ngữ pháp / từ vựng</div>
                            <div>${q.exp[1]}</div>
                        </div>
                        <div class="explanation-step">
                            <div class="step-heading">🔹 Bước 3: Tại sao đáp án này ĐÚNG?</div>
                            <div style="font-weight: 700; color: #00A955;">${q.exp[2]}</div>
                        </div>
                        <div class="explanation-step">
                            <div class="step-heading">🔹 Bước 4: Tại sao các phương án khác SAI?</div>
                            <div>${q.exp[3]}</div>
                        </div>
                    </div>
                `;
                quizTarget.appendChild(cardNode);
            });
        }

        function evaluateUserChoice(questionId, chosenKey, correctKey) {
            if (trackedStudentAnswers[questionId] !== undefined) return;
            trackedStudentAnswers[questionId] = chosenKey;
            
            const targetBtnNode = document.getElementById(`btn-choice-item-${questionId}-${chosenKey}`);
            const correctBtnNode = document.getElementById(`btn-choice-item-${questionId}-${correctKey}`);
            const parentCardNode = document.getElementById(`card-wrapper-id-${questionId}`);
            
            if (chosenKey === correctKey) {
                targetBtnNode.classList.add('correct-state');
                playDingSound();
                runConfettiExplosion();
            } else {
                targetBtnNode.classList.add('wrong-state');
                if (correctBtnNode) correctBtnNode.classList.add('correct-state');
                parentCardNode.classList.add('shake-animation');
                playBuzzSound();
                setTimeout(() => parentCardNode.classList.remove('shake-animation'), 450);
            }

            const childrenButtons = document.getElementById(`choices-grid-box-id-${questionId}`).getElementsByClassName('choice-btn');
            for (let btn of childrenButtons) { btn.disabled = true; }

            document.getElementById(`explanation-box-view-id-${questionId}`).style.display = 'block';
        }

        function processExamGrading() {
            let correctCount = 0;
            const totalQuestionsCount = questionsDatabase.length;
            
            questionsDatabase.forEach(q => {
                if (trackedStudentAnswers[q.id] === q.correct) {
                    correctCount++;
                }
            });

            const rawSuccessPercentage = (correctCount / totalQuestionsCount) * 100;
            const scoreDisplaySlot = document.getElementById('score-counter-slot');
            const commentDisplaySlot = document.getElementById('teacher-feedback-slot');

            scoreDisplaySlot.innerText = `${correctCount} / ${totalQuestionsCount}`;

            if (rawSuccessPercentage < 50) {
                commentDisplaySlot.innerText = "Điểm số chưa cao lắm. Con nhớ kéo lên xem kỹ lại phần phân tích 4 bước của từng câu để tích lũy kiến thức đề Chuyên nhé! Cô tin con sẽ bứt phá lần tới! 💕";
            } else if (rawSuccessPercentage >= 50 && rawSuccessPercentage <= 85) {
                commentDisplaySlot.innerText = "Kết quả rất tốt! Hãy ghi lại những cụm từ cố định (collocation) và phrasal verb làm sai vào sổ tay để nhớ lâu hơn con nhé! 🌟";
            } else {
                commentDisplaySlot.innerText = "Tuyệt vời ông mặt trời! Tư duy từ vựng và ngữ pháp của con vô cùng nhạy bén, giữ vững phong độ đỉnh cao này nhé! 🎉💎";
            }

            document.getElementById('result-summary-popup').classList.add('active');
        }

        function resetAndRestartQuiz() {
            document.getElementById('result-summary-popup').classList.remove('active');
            trackedStudentAnswers = {};
            buildAndRenderInterface();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.onload = () => {
            buildAndRenderInterface();
        };
    </script>
